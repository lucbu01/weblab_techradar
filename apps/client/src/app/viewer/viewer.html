<div class="radar-container">
  <div class="radar-layout">
    <mat-card class="radar-visualization">
      <mat-card-content>
        @defer (on timer(10ms)) {
        <svg
          viewBox="0 0 800 800"
          width="100%"
          height="100%"
          xmlns="http://www.w3.org/2000/svg"
        >
          <circle cx="400" cy="400" r="380" class="ring-assess" />
          <circle cx="400" cy="400" r="280" class="ring-trial" />
          <circle cx="400" cy="400" r="180" class="ring-adopt" />
          <circle cx="400" cy="400" r="80" class="ring-hold" />

          <line x1="400" y1="20" x2="400" y2="780" class="radar-line" />
          <line x1="20" y1="400" x2="780" y2="400" class="radar-line" />

          <text x="405" y="40" class="category-label">TECHNIQUES</text>
          <text x="760" y="415" class="category-label text-anchor-end">
            PLATFORMS
          </text>
          <text x="405" y="775" class="category-label">TOOLS</text>
          <text x="40" y="415" class="category-label">LANGS & FRAMEWORKS</text>

          @for (tech of technologies(); track tech.id) { @let point =
          getPoint(tech);
          <circle
            [attr.cx]="point.x"
            [attr.cy]="point.y"
            r="10"
            [attr.class]="'dot ' + tech.ring?.toLowerCase()"
            matTooltip="{{ tech.name }} - {{ tech.ring }}"
            [routerLink]="[]"
            [fragment]="tech.id"
          ></circle>
          <text
            [attr.x]="point.x"
            [attr.y]="point.y"
            font-size="14"
            font-weight="400"
            text-anchor="middle"
            dominant-baseline="central"
            pointer-events="none"
            fill="white"
          >
            {{tech.name.substring(0,1).toUpperCase()}}
          </text>
          }
        </svg>
        } @placeholder {
        <div class="radar-placeholder">
          <mat-spinner diameter="40"></mat-spinner>
          <span>Radar wird geladen...</span>
        </div>
        }
      </mat-card-content>
    </mat-card>

    <div class="radar-sidebar">
      <mat-card class="radar-legend">
        <mat-card-header>
          <mat-card-title>Legende</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <mat-chip-set aria-label="Radar Rings">
            <techradar-ring ring="ADOPT"></techradar-ring>
            <techradar-ring ring="TRIAL"></techradar-ring>
            <techradar-ring ring="ASSESS"></techradar-ring>
            <techradar-ring ring="HOLD"></techradar-ring>
          </mat-chip-set>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
