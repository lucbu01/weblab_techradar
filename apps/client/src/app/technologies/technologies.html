<button
  class="create-button"
  mat-fab
  color="primary"
  matTooltip="Technologie erstellen"
  (click)="addTechnology()"
>
  <mat-icon>add</mat-icon>
</button>
<form [formGroup]="searchForm">
  <div class="search-bar">
    <mat-form-field>
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>
    <mat-form-field>
      <mat-label>Kategorie</mat-label>
      <mat-select formControlName="category" multiple>
        <mat-option value="TECHNIQUES">Techniques</mat-option>
        <mat-option value="TOOLS">Tools</mat-option>
        <mat-option value="PLATFORMS">Platforms</mat-option>
        <mat-option value="LANGS_FRAMEWORKS">Languages & Frameworks</mat-option>
      </mat-select>
    </mat-form-field>
    <mat-form-field>
      <mat-label>Klassifizierung</mat-label>
      <mat-select formControlName="ring" multiple>
        <mat-option value="ADOPT">Adopt</mat-option>
        <mat-option value="TRIAL">Trial</mat-option>
        <mat-option value="ASSESS">Assess</mat-option>
        <mat-option value="HOLD">Hold</mat-option>
      </mat-select>
    </mat-form-field>
    <div>
      <mat-button-toggle-group formControlName="published">
        <mat-button-toggle [value]="'all'">Alle</mat-button-toggle>
        <mat-button-toggle [value]="true">Publiziert</mat-button-toggle>
        <mat-button-toggle [value]="false">Entwürfe</mat-button-toggle>
      </mat-button-toggle-group>
    </div>
  </div>
</form>
<cdk-virtual-scroll-viewport
  class="example-container"
  [itemSize]="52"
  [maxBufferPx]="1200"
  [minBufferPx]="400"
>
  <table mat-table [dataSource]="technologies()" class="mat-elevation-z8">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let element">
        {{element.name}} @if (!element.published) {
        <mat-chip style="margin-left: 5px" disabled>Entwurf</mat-chip>
        }
      </td>
    </ng-container>
    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef>Kategorie</th>
      <td mat-cell *matCellDef="let element">
        <techradar-category [category]="element.category"></techradar-category>
      </td>
    </ng-container>
    <ng-container matColumnDef="ring">
      <th mat-header-cell *matHeaderCellDef>Klassifizierung</th>
      <td mat-cell *matCellDef="let element">
        @if (element.ring) {
        <techradar-ring [ring]="element.ring"></techradar-ring>
        }
      </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button [matMenuTriggerFor]="menu">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="openDetailDialog(element)">
            <mat-icon>visibility</mat-icon>
            <span>Anzeigen</span>
          </button>
          <button mat-menu-item (click)="openEditDialog('edit', element)">
            <mat-icon>edit</mat-icon>
            Beschreibung ändern
          </button>
          @if (element.published) {
          <button mat-menu-item (click)="openEditDialog('classify', element)">
            <mat-icon>category</mat-icon>
            Einstufung ändern
          </button>
          } @else {
          <button mat-menu-item (click)="openEditDialog('publish', element)">
            <mat-icon>publish</mat-icon>
            Publizieren
          </button>
          }
          <button mat-menu-item (click)="deleteTechnology(element)">
            <mat-icon>delete</mat-icon>
            <span>Löschen</span>
          </button>
        </mat-menu>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</cdk-virtual-scroll-viewport>
